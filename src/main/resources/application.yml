spring:
  application:
    name: ghost-coach

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ghostcoach}
    username: ${SPRING_DATASOURCE_USERNAME:ghostcoach}
    password: ${SPRING_DATASOURCE_PASSWORD:ghostcoach_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: never

# --- App Config ---
app:
  jwt:
    secret: ${JWT_SECRET:default-secret-key-change-me-in-production-please-at-least-64-chars-long}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
    base-url: https://generativelanguage.googleapis.com/v1beta

  file:
    upload-dir: ${FILE_UPLOAD_DIR:./uploads}
    max-size-bytes: 5242880
    allowed-mime-types: image/jpeg,image/png,image/webp,image/gif

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

logging:
  level:
    root: INFO
    com.playmotech.ghostcoach: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
